name: CD — Build & Deploy

on:
  workflow_run:
    workflows: ["CI — Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY:      ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/aireviewhub-backend
  IMAGE_WIDGET:  ghcr.io/${{ github.repository_owner }}/aireviewhub-widget

jobs:

  check-ci-result:
    name: Vérifier résultat CI
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed — proceeding to build"

  # ── Backend : build + push GHCR + scan ────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: check-ci-result
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: final

      - name: Scan image avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:latest
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  # ── Widget : build + déploiement GitHub Pages (inchangé) ──
  build-widget:
    name: Build Widget
    runs-on: ubuntu-latest
    needs: check-ci-result
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: widget/package-lock.json
      - run: npm ci && npm run build
        working-directory: widget
      - uses: actions/upload-artifact@v4
        with:
          name: widget-dist-${{ github.sha }}
          path: widget/dist/
          retention-days: 30

  deploy-widget-cdn:
    name: Widget CDN (GitHub Pages)
    runs-on: ubuntu-latest
    needs: build-widget
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: widget-dist-${{ github.sha }}
          path: ./widget-dist
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./widget-dist
      - id: deployment
        uses: actions/deploy-pages@v4

  # ── Déploiement backend sur Render (approbation manuelle) ──
  deploy-backend-render:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: build-backend
    environment:
      name: production   # ← le bouton d'approbation manuelle GitHub se déclenche ici

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

  # ── Résumé ─────────────────────────────────────────────────
  deployment-summary:
    name: Résumé
    runs-on: ubuntu-latest
    needs: [build-backend, build-widget, deploy-backend-render]
    if: always()
    steps:
      - run: |
          echo "## Build & Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Étape | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend image | ${{ needs.build-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Widget | ${{ needs.build-widget.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Render deploy | ${{ needs.deploy-backend-render.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY